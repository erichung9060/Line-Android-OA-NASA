name: Release Debug APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Create local.properties
        run: |
          cat <<EOF > local.properties
          NASA_API_KEY=${{ secrets.NASA_API_KEY != '' && secrets.NASA_API_KEY || 'DEMO_KEY' }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL != '' && secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/NASA-Cosmos-Messenger-${{ github.ref_name }}-debug.apk

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/NASA-Cosmos-Messenger-${{ github.ref_name }}-debug.apk
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
